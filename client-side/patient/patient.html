<!DOCTYPE html>
<head>
  <meta charset="UTF-8">
  <title>Patient Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Ubuntu", sans-serif;
      color: rgb(45, 12, 61);
      font-style: normal;
      font-size: large;
    }

    body {
      /* background: #f1f5f9; */
      color: #1e293b;
      background-image: url('https://images.unsplash.com/photo-1549560826-4b7bfe23f37b?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzI1fHxwYXRpZW50fGVufDB8fDB8fHww');
      background-size: cover;
      background-position: center;
    }
    

    /* Navbar */
    .navbar {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: black;
      padding: 18px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .navbar h2 {
      font-size: 20px;
      font-weight: 600;
    }

    .navbar button {
      background: rgba(255,255,255,0.15);
      color: black;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .navbar button:hover {
      background: rgba(255,255,255,0.3);
      transform: translateY(-1px);
    }

    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }

    /* Cards */
    .card {
      /* a transparent background */
      background: rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 25px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card h3 {
      margin-bottom: 18px;
      font-size: 18px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 10px;
    }

    .card p {
      margin-bottom: 10px;
      color: #475569;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid #e2e8f0;
      padding: 25px;
      border-radius: 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .box i {
      font-size: 26px;
      margin-bottom: 12px;
      color: #4f46e5;
    }

    .box:hover {
      border-color: #4f46e5;
      background: #eef2ff;
      transform: translateY(-4px);
    }

    /* Form */
    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border-radius: 8px;
      border: 1px solid #cbd5f5;
      outline: none;
      font-size: 14px;
      transition: 0.2s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
    }

    button[type="submit"] {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #fff;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    /* Appointments List */
    #appointmentsList {
      list-style: none;
      margin-top: 10px;
    }

    #appointmentsList li {
      padding: 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #f8fafc;
      font-size: 14px;
    }

    /* Status Colors */
    .status {
      font-weight: 600;
    }

    .pending { color: orange; }
    .completed { color: green; }
    .canceled { color: red; }

    .hidden {
      display: none;
    }

    /* Mobile */
    @media (max-width: 600px) {
      .navbar {
        flex-direction: column;
        gap: 10px;
        text-align: center;
      }
    }
    /* Active tab */
.box.active {
  border-color: #4f46e5;
  background: rgba(255, 255, 255, 0.1);
  transform: translateY(-3px);
}

/* Smooth section transition */
.section {
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
  </style>
</head>

<body>

<div class="navbar">
  <h2>Patient Dashboard</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">

  <!-- Profile -->
  <div class="card">
    <h3>Profile</h3>
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Phone:</strong> <span id="phone"></span></p>
  </div>

  <!-- Actions -->
  <div class="grid">
  <div class="box active" id="bookTab" onclick="showSection('booking')">
    <i class="fa fa-calendar-plus"></i>
    <p>Book Appointment</p>
  </div>

  <div class="box" id="viewTab" onclick="showSection('appointments')">
    <i class="fa fa-list"></i>
    <p>View Appointments</p>
  </div>
</div>

  <!-- Booking -->
<div id="bookingSection" class="card section hidden">
  <h3>Book Appointment</h3>

    <form id="appointmentForm">

      <div class="input-group">
        <i class="fa fa-user-doctor"></i>
        <select id="doctor_id" required onfocus="loadDoctors()">
          <option value="">Select Doctor</option>
        </select>
      </div>

      <div class="input-group">
        <i class="fa fa-calendar"></i>
        <input type="date" id="appointment_date" required>
      </div>

      <div class="input-group">
        <i class="fa fa-clock"></i>
        <select id="appointment_time" required>
          <option value="">Select Time</option>
          <option value="09:00">09:00 AM</option>
          <option value="10:00">10:00 AM</option>
          <option value="11:00">11:00 AM</option>
          <option value="14:00">02:00 PM</option>
          <option value="15:00">03:00 PM</option>
          <option value="16:00">04:00 PM</option>
        </select>
      </div>

      <button type="submit">Book Appointment</button>

    </form>

</div>

<!-- Appointments -->
<div id="appointmentsSection" class="card section hidden">
  <h3>My Appointments</h3>
  <ul id="appointmentsList"></ul>
</div>

</div>
</body>

<script>
const patientToken = localStorage.getItem('patientToken');

let user = null; // ✅ make it global

// Redirect if not logged in
if (!patientToken) {
  window.location.href = "login.html";
}

// Fetch profile
fetch('http://localhost:3500/api/patients/profile', {
  headers: {
    'Authorization': 'Bearer ' + patientToken
  }
})
.then(res => {
  if (!res.ok) throw new Error('Unauthorized');
  return res.json(); // ✅ FIX
})
.then(data => {
  console.log('✅ User:', data);

  user = data; // ✅ store globally

  // ✅ Populate DOM AFTER data arrives
  document.getElementById('name').textContent =
    `${user.first_name} ${user.last_name}`;

  // Optional:
  document.getElementById('email').textContent = user.email;
  document.getElementById('phone').textContent = user.phone;
})
.catch(() => {
  localStorage.clear();
  window.location.href = "login.html";
});


function showSection(section) {
  const booking = document.getElementById('bookingSection');
  const appointments = document.getElementById('appointmentsSection');

  const bookTab = document.getElementById('bookTab');
  const viewTab = document.getElementById('viewTab');

  if (section === 'booking') {
    booking.classList.remove('hidden');
    appointments.classList.add('hidden');

    bookTab.classList.add('active');
    viewTab.classList.remove('active');
  } else {
    booking.classList.add('hidden');
    appointments.classList.remove('hidden');

    bookTab.classList.remove('active');
    viewTab.classList.add('active');

    checkAppointments(); // auto-load appointments
  }
}


async function loadDoctors() {
 
  try {
    const res = await fetch('http://localhost:3500/api/doctors');
    if (!res.ok) throw new Error('Failed to load doctors');
    const data = await res.json();
    const select = document.getElementById('doctor_id');
    data.forEach(doctor => {
      const option = document.createElement('option');
      option.value = doctor.id;
      option.textContent = `${doctor.first_name} ${doctor.last_name} (${doctor.specialization})`;
      select.appendChild(option);
    });
  } catch (err) {
    console.error(err);
    alert('Error loading doctors. Please try again later.');
}
}

function logout() {
  localStorage.clear();
  window.location.href = "login.html";
}

// submit appointment form
const form = document.getElementById('appointmentForm');
form.addEventListener('submit', function(e) {
  e.preventDefault();

  const doctorId = parseInt(document.getElementById('doctor_id').value);
  const date = document.getElementById('appointment_date').value;
  const time = document.getElementById('appointment_time').value;

  if (!doctorId || !date || !time) {
    alert("All fields are required");
    return;
  }

  const formattedTime = time.length === 5 ? time + ":00" : time;

  console.log({ doctorId, date, formattedTime });

  fetch('http://localhost:3500/api/appointments', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      patient_id: user.id,
      doctor_id: doctorId,
      appointment_date: date,
      appointment_time: formattedTime,
      status: "pending"
    })
  })
  .then(res => {
    console.log("Status:", res.status);
    return res.json();
  })
  .then(data => {
    console.log(data);
    if (data.success) {
      alert('Appointment booked successfully!');
      form.reset();
    } else {
      alert('Failed to book appointment: ' + data.message);
    }
  })
  .catch(err => {
    console.error(err);
    alert('Error booking appointment. Please try again later.');
  });
});


function checkAppointments() {
  fetch(`http://localhost:3500/api/patients/${user.id}/appointments`, {
    headers: {
      'Authorization': 'Bearer ' + patientToken
    }
  })
  .then(res => res.json())
  .then(data => {
    console.log('Appointments:', data);
    const list = data.appointments || [];
        
    document.getElementById('appointmentsList').innerHTML = list.map(app => `
      <li>
        Dr. ${app.doctor_first_name} ${app.doctor_last_name} - ${app.appointment_date} at ${app.appointment_time} (${app.status})
      </li>
    `).join('');
  })
  .catch(err => {
    console.error(err);
    alert('Error fetching appointments. Please try again later.');
  });
}
</script>


</html>
