<!DOCTYPE html>
<html lang="en">
<head>
  <title>Login</title>
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 35px;
      border-radius: 14px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 5px;
    }

    h3 {
      text-align: center;
      margin-bottom: 25px;
      color: #666;
      font-weight: normal;
    }

    .input-group {
      position: relative;
      margin-bottom: 18px;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }

    .input-group input {
      width: 100%;
      padding: 12px 12px 12px 38px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 6px rgba(79,70,229,0.3);
    }

    /* Validation */
    input:valid {
      border-color: #10b981;
    }

    input:invalid:not(:placeholder-shown) {
      border-color: #ef4444;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .options a {
      text-decoration: none;
      color: #4f46e5;
    }

    .options a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4338ca;
    }

    p {
      margin-top: 15px;
      text-align: center;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
    }
    a button {
      width: auto;
      padding: 10px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
      <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <a href="../patient/login.html"><button>Patient</button></a>
        <a href="../doctor/login.html"><button>Doctor</button></a>
      </div>
  <form  method="POST">
   
    <h2>Login as Patient</h2>
    <h3>Enter your credentials</h3>

    <div class="input-group">
      <i class="fa fa-envelope"></i>
      <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <i class="fa fa-lock"></i>
      <input type="password" id="password" placeholder="Password" required>
    </div>

    <div class="options">
      <label>
        <input type="checkbox"> Remember me
      </label>
      <a href="#">Forgot password?</a>
    </div>

    <button type="submit">Login</button>

    <p>Not registered? <a href="register.html">Create an account</a></p>
  </form>
  </div>

</body>

<script>
  const form = document.querySelector('form');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    fetch('http://localhost:3500/api/patients/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value
    })
  })
  .then(response => response.json())
  .then(data => {
  if (data.success) {

    // THIS is frontend (browser)
    localStorage.setItem('user', JSON.stringify(data.user));

    window.location.href = "patient.html";

  } else {
    alert('Login failed: ' + data.message);
  }
})
  });
</script>

</html>
