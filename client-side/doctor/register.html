<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Register</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 30px;
      border-radius: 14px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    h3 {
      text-align: center;
      margin-bottom: 25px;
      color: #666;
      font-weight: normal;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .full {
      grid-column: span 2;
    }

    .input-group {
      position: relative;
    }

    .input-group i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
    }

    .input-group input,
    .input-group select {
      width: 100%;
      padding: 12px 12px 12px 38px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus,
    .input-group select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 6px rgba(79,70,229,0.3);
    }

    /* Validation */
    input:valid {
      border-color: #10b981;
    }

    input:invalid:not(:placeholder-shown) {
      border-color: #ef4444;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4338ca;
    }

    p {
      margin-top: 15px;
      text-align: center;
    }

    a {
      color: #4f46e5;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media(max-width: 600px){
      .grid {
        grid-template-columns: 1fr;
      }
      .full {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>
  <form class="card" method="POST">
    <h1>Register</h1>
    <h3>Enter your details</h3>

    <div class="grid">
      <div>
        <div class="input-group">
          <i class="fa fa-user"></i>
          <input type="text" name="first_name" placeholder="First Name" required> 
        </div>
      </div>
      <div>
        <div class="input-group">
          <i class="fa fa-user"></i>
          <input type="text" name="last_name" placeholder="Last Name" required> 
        </div>
      </div>
      <div>
        <div class="input-group">
          <i class="fa fa-envelope"></i>
          <input type="email" name="email" placeholder="Email" required> 
        </div>
      </div>
      <div>
        <div class="input-group">
          <i class="fa fa-lock"></i>
          <input type="password" name="password" placeholder="Password" required> 
        </div>
      </div>
      <div>
        <div class="input-group">
          <i class="fa fa-stethoscope"></i>
          <select name="specialisation" id="specialisation" required>
            <option value="" disabled selected>Select your specialisation</option>
            <option value="Cardiology">Cardiology</option>
            <option value="Neurology">Neurology</option>
            <option value="Pediatrics">Pediatrics</option>
            <option value="Surgeon">Surgeon</option>
            <!-- Add more specialisations as needed -->
          </select>
        </div>
      </div>
      <div>
        <div class="input-group">
          <i class="fa fa-phone"></i>
          <input type="text" name="phone" placeholder="Phone" required> 
        </div>
      </div>
      <div class="full">
        <div class="input-group">
          <i class="fa fa-calendar"></i>
          <select name="schedule" id="schedule" required>
            <option value="" disabled selected>Select Schedule</option>
            <option value="Mon-Fri 9am-5pm">Mon-Fri 9am-5pm</option>
            <option value="Sat-Sun 10am-2pm">Sat-Sun 10am-2pm</option>
          </select>
        </div>
      </div>
    </div>


    <button type="submit">Register</button>

    <p>Already have an account? <a href="login.html">Login here</a></p>
  </form>
</body>
<script>
  const renderApi = 'https://telemedicine-app-p6ea.onrender.com'
  const form = document.querySelector('form');
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const formData = {
    first_name: form.querySelector('[name="first_name"]').value,
    last_name: form.querySelector('[name="last_name"]').value,
    email: form.querySelector('[name="email"]').value,
    password: form.querySelector('[name="password"]').value,
    phone: form.querySelector('[name="phone"]').value,
    date_of_birth: form.querySelector('[name="date_of_birth"]').value,
    gender: form.querySelector('[name="gender"]').value,
    address: form.querySelector('[name="address"]').value
    };
    fetch(`${renderApi}/api/patients`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(formData)
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      alert('Registration successful!');
      // Redirect to login page or another page.
      window.location.href = 'login.html'; // Change to your login page
    } else {
      alert('Registration failed: ' + data.message);
    }
  })
  .catch(error => {
    console.error('Error:', error);
    alert('An error occurred during registration. Please try again later.');
  });

  });

</script>
</html>
